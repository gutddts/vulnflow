# Nuclei 扫描技能
id: vulnflow-nuclei
name: Nuclei扫描
version: 1.0.0
description: 基于模板的漏洞扫描，使用内置模板检测常见漏洞、信息泄露、配置错误和 CVE
category: exploit
type: nuclei_scan

author: VulnFlow Team
license: MIT
tags:
  - nuclei
  - template-scanning
  - cve
  - vulnerability-scanning
  - misconfiguration

image: vulnflow/nuclei:1.0.0

inputs:
  type: object
  required:
    - target
  properties:
    target:
      type: string
      description: 目标 URL 或 IP
      example: "http://example.com"
    templates:
      type: array
      description: 要使用的模板名称列表，为空则使用所有模板
      items:
        type: string
    severities:
      type: array
      description: 要检查的严重程度
      items:
        type: string
        enum: ["critical", "high", "medium", "low", "info"]
      default: ["critical", "high", "medium"]
    categories:
      type: array
      description: 模板分类
      items:
        type: string
        enum: ["exposure", "misconfiguration", "cve", "default-login", "tech-stack"]
      default: ["exposure", "misconfiguration", "cve"]
    timeout:
      type: number
      default: 10
    max_concurrency:
      type: integer
      default: 10
    headers:
      type: object
      default: {}
    proxy:
      type: string

outputs:
  type: object
  required:
    - findings
    - summary
  properties:
    findings:
      type: array
      items:
        type: object
        required:
          - template_name
          - severity
          - matched_url
          - details
        properties:
          template_name:
            type: string
          template_id:
            type: string
          severity:
            type: string
            enum: ["critical", "high", "medium", "low", "info"]
          category:
            type: string
          matched_url:
            type: string
          details:
            type: string
          evidence:
            type: string
          cve_id:
            type: string
          cvss_score:
            type: number
          remediation:
            type: string
    summary:
      type: object
      properties:
        total_findings:
          type: integer
        by_severity:
          type: object
        by_category:
          type: object
        templates_executed:
          type: integer
        duration_seconds:
          type: number

timeout_seconds: 300

resource_limits:
  memory: "512m"
  cpu_quota: 50000

metadata:
  owasp: "A06:2021 - Vulnerable and Outdated Components"
  requires_network: true
  skill_type: active_scan
