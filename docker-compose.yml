version: "3.9"

# ============================================================
# VulnFlow - AI 驱动的渗透测试智能体平台
# Docker Compose 编排文件
# ============================================================

services:
  # ==========================================================
  # Nginx - 反向代理
  # ==========================================================
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: vulnflow-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - vulnflow_net
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================
  # Backend - FastAPI 应用
  # ==========================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vulnflow-backend
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-vulnflow}:${POSTGRES_PASSWORD:-vulnflow_secret}@postgres:5432/${POSTGRES_DB:-vulnflow}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MINIO_ENDPOINT=minio:9000
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./backend:/app
      - backend_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vulnflow_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ==========================================================
  # Celery Worker - 异步任务执行
  # ==========================================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vulnflow-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=100
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-vulnflow}:${POSTGRES_PASSWORD:-vulnflow_secret}@postgres:5432/${POSTGRES_DB:-vulnflow}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MINIO_ENDPOINT=minio:9000
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./backend:/app
      - celery_data:/app/celery
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vulnflow_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # ==========================================================
  # Celery Beat - 定时任务调度
  # ==========================================================
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vulnflow-celery-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-vulnflow}:${POSTGRES_PASSWORD:-vulnflow_secret}@postgres:5432/${POSTGRES_DB:-vulnflow}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend:/app
    networks:
      - vulnflow_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================
  # Frontend - React 开发服务器
  # ==========================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: vulnflow-frontend
    expose:
      - "3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000/ws
      - WDS_SOCKET_PORT=0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - vulnflow_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ==========================================================
  # PostgreSQL - 主数据库
  # ==========================================================
  postgres:
    image: postgres:16-alpine
    container_name: vulnflow-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-vulnflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vulnflow_secret}
      - POSTGRES_DB=${POSTGRES_DB:-vulnflow}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - vulnflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vulnflow} -d ${POSTGRES_DB:-vulnflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=64MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  # ==========================================================
  # Redis - 缓存与消息队列
  # ==========================================================
  redis:
    image: redis:7-alpine
    container_name: vulnflow-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - vulnflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    sysctls:
      - net.core.somaxconn=1024

  # ==========================================================
  # Elasticsearch - 日志与搜索
  # ==========================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: vulnflow-elasticsearch
    environment:
      - node.name=vulnflow-es01
      - cluster.name=vulnflow-es-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    networks:
      - vulnflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ==========================================================
  # MinIO - 对象存储（文件/截图/报告）
  # ==========================================================
  minio:
    image: minio/minio:latest
    container_name: vulnflow-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:9001
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - vulnflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==========================================================
  # Qdrant - 向量数据库（RAG 知识库）
  # ==========================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vulnflow-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    networks:
      - vulnflow_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

# ============================================================
# 网络
# ============================================================
networks:
  vulnflow_net:
    driver: bridge
    name: vulnflow_net

# ============================================================
# 数据卷
# ============================================================
volumes:
  postgres_data:
    name: vulnflow_postgres_data
    driver: local
  redis_data:
    name: vulnflow_redis_data
    driver: local
  elasticsearch_data:
    name: vulnflow_elasticsearch_data
    driver: local
  minio_data:
    name: vulnflow_minio_data
    driver: local
  qdrant_data:
    name: vulnflow_qdrant_data
    driver: local
  backend_data:
    name: vulnflow_backend_data
    driver: local
  celery_data:
    name: vulnflow_celery_data
    driver: local
  nginx_logs:
    name: vulnflow_nginx_logs
    driver: local
